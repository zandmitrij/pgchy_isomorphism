name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: my_database
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Miniconda
      uses: conda-incubator/setup-miniconda@v2
      with:
        auto-update-conda: true
        auto-activate-base: false
        python-version: 3.8.12

    - name: Install postgres c lib
      run: |
        sudo apt-get update
        sudo apt-get install postgresql-server-dev-14 postgresql-common

    - name: Add conda-forge channel
      run: conda config --add channels conda-forge

    - name: Initialize conda
      run: conda init bash

    - name: Create conda environment
      run: conda create --name build-env gcc make postgresql

    - name: Activate conda environment
      shell: bash -l {0}
      run: conda activate build-env

    - name: Build extension
      run: |
        make
        sudo make install

    - name: Wait for PostgreSQL to start
      run: sleep 10

    - name: Copy extension files
      run: |
        sudo cp pgchy_isomorphism.control /usr/share/postgresql/14/extension/
        sudo chmod 644 /usr/share/postgresql/14/extension/pgchy_isomorphism.control
        sudo cp sql/pgchy_isomorphism--1.0.sql /usr/share/postgresql/14/extension/
        sudo chmod 644 /usr/share/postgresql/14/extension/pgchy_isomorphism--1.0.sql


    - name: Run tests
      env:
        PGUSER: postgres
        PGPASSWORD: postgres
      run: |
        psql -h localhost -d my_database -c "CREATE EXTENSION pgchy_isomorphism;"
